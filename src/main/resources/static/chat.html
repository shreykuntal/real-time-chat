<!DOCTYPE html>
<html>
<head>
    <title>Chat Home</title>

    <link rel="stylesheet" href="chatStyle.css">

</head>

<body>
<div id="topBar">

    <!-- Left: Active Users -->
    <div class="dropdown-group">
        <h4>Online users</h4>
        <select id="activeUsersDropdown"></select>
    </div>

    <!-- Right: All Users -->
    <div class="dropdown-group">
        <h4>Selected user</h4>
        <select id="allUsersDropdown">
            <option value="GC" selected="selected">GC</option>
        </select>
    </div>

</div>
<div id="chatContainer">
    <h3>Chat</h3>

    <div id="messageBox"></div>

    <div id="inputArea">
        <input id="messageInput" placeholder="Type message...">
        <button id="sendBtn">Send</button>
    </div>
    <button id="logoutBtn">Logout</button>
</div>

<script src="chat.js"></script>

</body>
</html>
